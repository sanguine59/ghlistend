name: daemon

on:
  pull_request:
    paths:
      - 'daemon/**'
      - 'shared/**'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/daemon.yml'

# Only one run per PR ref. A new push to the PR cancels the prior run so we
# never have two CI jobs racing for the same head commit.
concurrency:
  group: daemon-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: daemon/go.sum

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build (amd64)
        run: go build ./...

      - name: Cross-compile (arm64)
        run: go build ./...
        env:
          GOOS: linux
          GOARCH: arm64

      - name: Unit + feature tests
        run: go test -race ./...
